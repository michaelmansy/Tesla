<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./css/style.css">
    <title>Design Your Tesla Model</title>
</head>
<body>
    <!-- Top Bar -->
    <div id="top-bar" class="bg-gray-100 fixed top-0 right-0 left-0 py-2">
        <p class="text-center py-2 font-semibold">0% APR available for qualified buyers</p>
    </div>

    <!-- Header -->
    <header class="flex justify-between items-center px-10 py-6 mt-16">
        <img src="./images/logo.svg" alt="Tesla" width="120" height="24">
        <button>
            <i class="fa-solid fa-globe"></i> <span class="font-bold">US</span>
        </button>
    </header>

    <!-- Main -->
     <!-- md:flex-row means eno medium screens and up we want flex row -->
     <main class="flex flex-col md:flex-row justify-between px-4 md:px-10 py-6">
        <!-- image -->
        <section class="w-full md:w-3/4">
            <div class="sticky top-24">
                <!-- Exterior Image -->
                 <div class="h-96 bg-gray-200 flex items-center justify-center overflow-hidden mb-4">
                    <img src="./images/model-y-stealth-grey.jpg" alt="Model y" class="max-w-full h-auto transform scale-125" id="exterior">
                 </div>

                <!-- Interior Image -->
                <div class="h-96 bg-gray-200 flex items-center justify-center overflow-hidden mb-4">
                    <img src="./images/model-y-interior-dark.jpg" alt="Model y" class="max-w-full h-auto transform scale-125"
                        id="interior">
                </div>
            </div>
        </section>

        <!-- sidebar -->
         <aside class="w-full md:w-1/3 pl-0 md:pl-8 mt-6 md:mt-0 z-2">
            <h1 class="text-5xl text-center font-bold mb-5">Model Y</h1>
            <h2 class="text-xl text-center font=light">Customize Your Car</h2>

            <!-- Exterior Buttons -->
            <div class="my-8" id="exterior-buttons">
                <h3 class="font-semibold mb-2">Exterior Colors</h3>
                <div class="flex space-x-4">
                    <button class="transition-transform-transform duration-300 hover: scale-100">
                        <img src="./images/button-stealth-grey.avif" alt="Stealth Grey" class="w-22">
                    </button>
                </div>
            </div>
         </aside>

            
     </main>

    <script src="./js/main.js"></script>
</body>
</html>
